name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dstretch/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dstretch

      - name: Build
        run: npm run build
        working-directory: dstretch

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dstretch/dist
          clean: true
          single-commit: true
